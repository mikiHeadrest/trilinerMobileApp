<ion-header [translucent]="true" >

  <div style="width: 100%; background-color: #2C4252;">
    <div class="headerClass">
      <div style="height: 25%;">
        <br>
      </div>

      <div class="headerContent">
        <ion-icon name="time" style="height:25px;width: 25px;">
        </ion-icon>
        <span>
          <b> Historial de Movimientos </b>
        </span>
      </div>

    </div>

    <!-- lo que esta abajo del Header -->
    <div style="height: 53px; width: 100%; display: flex; align-items: center; ">
      <!-- width = 70% -->
      <div class="searchBarContainer">
        <div class="searchIconContainer">
          <ion-icon name="search-outline"></ion-icon>
        </div>
        <ion-input color="transparent" class="searchInputStyle" placeholder="Buscar..."></ion-input>
      </div>

      <!-- width = 30% -->
      <div class="comboBoxContainer">
        <div class="contentComboBox">
          <span class="textCombo">
            Sin filtro eee sans
          </span>
        </div>
        <div class="comboBoxButton">
          <ion-icon name="caret-down-outline"></ion-icon>
        </div>
      </div>

    </div>

  </div>


</ion-header>
