<ion-header [translucent]="true">

  <!-- Aqui poner busqueda pero sin comboBox -->

  <div class="firstSectionContainer">
    <div class="searchBarContainer">
      <div class="searchIconContainer">
        <ion-icon name="search-outline"></ion-icon>
      </div>
      <ion-input color="transparent" class="searchInputStyle" placeholder="Buscar..."></ion-input>
    </div>
  </div>

  <!-- Barra de Abajo lel -->

  <div class="bgDateSelector">
    <div class="dateSelectorContainer" >

      <div class="dateArrowIcon">
        <ion-icon name="arrow-back-circle"></ion-icon>
      </div>
      <div (click)="volver()" class="dateInfoContainer">
        <div class="dateInfoBox">
          <b>{{date}}</b>
        </div>
      </div>
      <div class="dateArrowIcon">
        <ion-icon style="rotate: 180deg; " name="arrow-back-circle"></ion-icon>
      </div>
    </div>
  </div>
</ion-header>

<ion-content>
<div class="contentContainer">
  <div class="containerOfLists">
    <div style="width: 97%; ">

        <!-- Cargar Elementos  -->
        <app-hm-info-elemento
          [urlImage]="`https://www.fangamer.com/cdn/shop/products/product_DR_light_ralsei_plush_photo1.png?crop=center&height=1200&v=1691703459&width=1800`"
          [name]="`Peluche de Ralsei`"
          [franquicia]="`Deltarune`"
          [quantity]="`2`"
          [id_producto]="`000000004`"
          [hour]="`21:52`"

          [TypeOfOperation]="true">
        </app-hm-info-elemento>
        <!-- fin -->

    </div>

    <!-- ELIMINAR COMPONENTES DE PRUEBA  -->

    <!-- FIN DE COMPONENTES DE PRUEBA -->

    </div>
  </div>
</ion-content>
